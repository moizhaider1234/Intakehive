<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntakeHive — Admin Lead Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --navy:#07111F; --navy2:#0C1A2E; --gold:#C9A84C; --gold2:#E2BB68; --cream:#F0EDE8; --slate:#8A9DB8; --green:#28A96A; --red:#C41230; --gcta:#1A7A45; --gcta2:#21964F; --border:rgba(201,168,76,0.15); }
  * { box-sizing: border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--navy); color:var(--cream); min-height:100vh; padding:40px 5%; }
  h1 { font-size:1.5rem; color:var(--gold); margin-bottom:8px; }
  .subtitle { color:var(--slate); font-size:0.85rem; margin-bottom:32px; }
  .stats { display:flex; gap:20px; margin-bottom:32px; flex-wrap:wrap; }
  .stat-box { background:var(--navy2); border:1px solid var(--border); border-radius:6px; padding:20px 28px; }
  .stat-box .num { font-size:2rem; font-weight:700; color:var(--gold); }
  .stat-box .lbl { font-size:0.72rem; color:var(--slate); text-transform:uppercase; letter-spacing:0.08em; }
  .controls { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  input, select { background:var(--navy2); border:1px solid var(--border); color:var(--cream); padding:10px 14px; border-radius:4px; font-family:inherit; font-size:0.85rem; }
  input::placeholder { color:var(--slate); }
  button { padding:10px 20px; border-radius:4px; border:none; cursor:pointer; font-family:inherit; font-size:0.85rem; font-weight:600; }
  .btn-export { background:linear-gradient(135deg,var(--gcta),var(--gcta2)); color:#fff; }
  .btn-clear { background:rgba(201,76,76,0.2); color:var(--red); border:1px solid rgba(201,76,76,0.3); }
  table { width:100%; border-collapse:collapse; font-size:0.82rem; }
  th { background:var(--navy2); color:var(--gold); text-align:left; padding:12px 14px; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em; border-bottom:1px solid var(--border); }
  td { padding:12px 14px; border-bottom:1px solid rgba(255,255,255,0.04); color:var(--cream); vertical-align:middle; }
  tr:hover td { background:rgba(255,255,255,0.02); }
  .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.68rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; }
  .badge-green { background:rgba(61,184,122,0.12); color:var(--green); border:1px solid rgba(61,184,122,0.3); }
  .empty { text-align:center; padding:60px; color:var(--slate); }
  .table-wrap { background:var(--navy2); border:1px solid var(--border); border-radius:6px; overflow:auto; }
  .password-gate { max-width:360px; margin:80px auto; background:var(--navy2); border:1px solid var(--border); border-radius:8px; padding:40px; text-align:center; }
  .password-gate h2 { color:var(--gold); margin-bottom:8px; }
  .password-gate p { color:var(--slate); font-size:0.85rem; margin-bottom:24px; }
  .password-gate input { width:100%; margin-bottom:14px; }
  .password-gate button { width:100%; background:linear-gradient(135deg,var(--gcta),var(--gcta2)); color:#fff; }
  #main { display:none; }
</style>
</head>
<body>

<!-- Password Gate -->
<div class="password-gate" id="gate">
  <h2>IntakeHive Admin</h2>
  <p>Enter the admin password to view leads.</p>
  <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
  <button onclick="checkPw()">Access Dashboard</button>
  <p id="pwErr" style="color:#c94c4c;font-size:0.78rem;margin-top:10px;display:none">Incorrect password.</p>
</div>

<div id="main">
  <h1>IntakeHive — Lead Dashboard</h1>
  <p class="subtitle">All eligibility submissions captured from the landing page.</p>
  <div class="stats">
    <div class="stat-box"><div class="num" id="totalCount">0</div><div class="lbl">Total Leads</div></div>
    <div class="stat-box"><div class="num" id="todayCount">0</div><div class="lbl">Today</div></div>
    <div class="stat-box"><div class="num" id="weekCount">0</div><div class="lbl">This Week</div></div>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="Search by name, email, state…" oninput="renderTable()">
    <select id="stateFilter" onchange="renderTable()"><option value="">All States</option></select>
    <select id="diagFilter" onchange="renderTable()"><option value="">All Diagnoses</option></select>
    <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn-clear" onclick="clearLeads()">🗑 Clear All</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Date</th>
          <th>Full Name</th>
          <th>Phone</th>
          <th>Email</th>
          <th>State</th>
          <th>Diagnosis</th>
          <th>Year</th>
          <th>Talcum Use</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="emptyMsg" style="display:none">No leads found.</div>
  </div>
</div>

<script>
  // ─── CONFIG ──────────────────────────────────────────────────────────────────
  const API_URL  = 'https://intakehive-production.up.railway.app'; // your deployed backend URL
  const ADMIN_PW = 'IH2026';        // must match ADMIN_KEY in .env

  // ─── Auth gate ───────────────────────────────────────────────────────────────
  function checkPw() {
    const pw = document.getElementById('pwInput').value;
    if (pw === ADMIN_PW) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      init();
    } else {
      document.getElementById('pwErr').style.display = 'block';
    }
  }

  // ─── LocalStorage helpers ─────────────────────────────────────────
  const LS_KEY = 'ih_leads';
  function lsGetLeads(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||'[]'); }catch(e){ return []; } }

  // ─── State ───────────────────────────────────────────────────────────────────
  let leads = [];
  let currentPage = 1;
  const PAGE_SIZE = 50;

  // ─── API helpers ─────────────────────────────────────────────────────────────
  async function apiFetch(path, opts = {}) {
    const res = await fetch(API_URL + path, {
      ...opts,
      headers: { 'x-admin-key': ADMIN_PW, 'Content-Type': 'application/json', ...(opts.headers||{}) },
    });
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      throw new Error(j.error || `HTTP ${res.status}`);
    }
    return res.json();
  }

  // ─── Init ────────────────────────────────────────────────────────────────────
  async function init() {
    await loadStats();
    await loadLeads();
    populateFilters();
  }

  async function loadStats() {
    try {
      const stats = await apiFetch('/api/stats');
      document.getElementById('totalCount').textContent = stats.total ?? 0;
      document.getElementById('todayCount').textContent = stats.today ?? 0;
      document.getElementById('weekCount').textContent  = stats.week  ?? 0;
    } catch(e) {
      const local = lsGetLeads();
      const today = new Date().toISOString().slice(0,10);
      const weekAgo = new Date(Date.now()-7*86400000).toISOString();
      document.getElementById('totalCount').textContent = local.length;
      document.getElementById('todayCount').textContent = local.filter(l=>l.created_at&&l.created_at.startsWith(today)).length;
      document.getElementById('weekCount').textContent  = local.filter(l=>l.created_at&&l.created_at>=weekAgo).length;
    }
  }

  async function loadLeads() {
    const q  = document.getElementById('search').value;
    const st = document.getElementById('stateFilter').value;
    const params = new URLSearchParams({ page: currentPage, limit: PAGE_SIZE });
    if (q)  params.set('search', q);
    if (st) params.set('state',  st);

    try {
      const res = await apiFetch('/api/leads?' + params.toString());
      leads = res.leads || [];
      renderTable();
      renderPager(res.pagination);
    } catch(e) {
      // Backend unavailable — read from localStorage
      let local = lsGetLeads();
      if (q) { const lq=q.toLowerCase(); local=local.filter(l=>[l.first_name||l.firstName,l.last_name||l.lastName,l.email,l.phone,l.state,l.diagnosis].some(v=>v&&String(v).toLowerCase().includes(lq))); }
      if (st) local = local.filter(l=>l.state===st);
      leads = local.map(l=>({ ...l, first_name:l.firstName||l.first_name||'', last_name:l.lastName||l.last_name||'' }));
      renderTable();
      renderPager(null);
    }
  }

  function populateFilters() {
    // Populate state & diagnosis dropdowns from first batch of data
    const states = [...new Set(leads.map(l=>l.state).filter(Boolean))].sort();
    const diags  = [...new Set(leads.map(l=>l.diagnosis).filter(Boolean))].sort();
    const sf = document.getElementById('stateFilter');
    const df = document.getElementById('diagFilter');
    // Clear existing options past the first
    while (sf.options.length > 1) sf.remove(1);
    while (df.options.length > 1) df.remove(1);
    states.forEach(s => { const o=document.createElement('option'); o.value=s; o.textContent=s; sf.appendChild(o); });
    diags.forEach(d  => { const o=document.createElement('option'); o.value=d; o.textContent=d; df.appendChild(o); });
  }

  // Debounced search
  let searchTimer;
  function onSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage=1; loadLeads(); }, 300);
  }
  document.getElementById('search').oninput = onSearch;
  document.getElementById('stateFilter').onchange = () => { currentPage=1; loadLeads(); };
  document.getElementById('diagFilter').onchange  = () => { currentPage=1; loadLeads(); };

  // ─── Render ──────────────────────────────────────────────────────────────────
  function renderTable() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    document.getElementById('emptyMsg').style.display = leads.length ? 'none' : 'block';
    if (!leads.length) return;
    leads.forEach((l, i) => {
      const d = l.created_at
        ? new Date(l.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
        : '—';
      const name = [l.first_name, l.last_name].filter(Boolean).join(' ') || '—';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="color:var(--slate)">${(currentPage-1)*PAGE_SIZE + i + 1}</td>
        <td style="color:var(--slate);font-size:0.75rem">${d}</td>
        <td><strong>${esc(name)}</strong><br><span style="font-size:0.7rem;color:var(--gold)">${esc(l.tort||'')}</span></td>
        <td style="font-family:'DM Mono',monospace;font-size:0.78rem">${esc(l.phone||'—')}</td>
        <td style="font-size:0.78rem">${esc(l.email||'—')}</td>
        <td>${esc(l.state||'—')}</td>
        <td>${esc(l.diagnosis||'—')}</td>
        <td>${esc(l.diag_year||l.injury_year||'—')}</td>
        <td>${esc(l.used_years||'—')}</td>
        <td>
          <span class="badge badge-green">New</span>
          <button onclick="deleteLead('${l.id}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:0.75rem;margin-left:6px" title="Delete">✕</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  function renderPager(pagination) {
    let pager = document.getElementById('pager');
    if (!pager) {
      pager = document.createElement('div');
      pager.id = 'pager';
      pager.style.cssText = 'display:flex;gap:10px;align-items:center;padding:16px 14px;color:var(--slate);font-size:0.82rem';
      document.querySelector('.table-wrap').appendChild(pager);
    }
    if (!pagination) { pager.innerHTML=''; return; }
    const { total, page, pages } = pagination;
    pager.innerHTML = `
      <span>Showing ${(page-1)*PAGE_SIZE+1}–${Math.min(page*PAGE_SIZE,total)} of ${total}</span>
      <button onclick="gotoPage(${page-1})" ${page<=1?'disabled':''} style="background:var(--navy2);border:1px solid var(--border);color:var(--cream);padding:6px 12px;border-radius:4px;cursor:pointer">← Prev</button>
      <button onclick="gotoPage(${page+1})" ${page>=pages?'disabled':''} style="background:var(--navy2);border:1px solid var(--border);color:var(--cream);padding:6px 12px;border-radius:4px;cursor:pointer">Next →</button>`;
  }

  function gotoPage(p) { currentPage = p; loadLeads(); }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ─── Export CSV (server-side) ─────────────────────────────────────────────
  function exportCSV() {
    const st = document.getElementById('stateFilter').value;
    const params = new URLSearchParams({ adminKey: ADMIN_PW });
    if (st) params.set('state', st);
    window.location.href = `${API_URL}/api/leads/export?${params}`;
  }

  // ─── Delete single lead ───────────────────────────────────────────────────
  async function deleteLead(id) {
    if (!confirm('Delete this lead? This cannot be undone.')) return;
    try {
      await apiFetch(`/api/leads/${id}`, { method: 'DELETE' });
      await loadLeads();
      await loadStats();
    } catch(e) {
      alert('Delete failed: ' + e.message);
    }
  }

  // ─── Clear all ────────────────────────────────────────────────────────────
  function clearLeads() {
    alert('To delete all leads, use the DELETE endpoint in the API or remove the database file on the server. Individual leads can be deleted with the ✕ button.');
  }
</script>
</body>
</html>
